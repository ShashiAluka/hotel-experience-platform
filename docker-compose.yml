version: '3.9'

services:
  # ─── Databases ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hxp
      POSTGRES_USER: hxp_admin
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hxp_admin -d hxp"]
      interval: 5s; timeout: 5s; retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws dynamodb create-table
          --table-name hxp-local-guest-profiles
          --attribute-definitions AttributeName=guestId,AttributeType=S AttributeName=email,AttributeType=S
          --key-schema AttributeName=guestId,KeyType=HASH
          --global-secondary-indexes '[{\"IndexName\":\"EmailIndex\",\"KeySchema\":[{\"AttributeName\":\"email\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb-local:8000 || true
      "

  # ─── Services ────────────────────────────────────────────
  reservation-service:
    build:
      context: ./services/reservation-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hxp
      SPRING_DATASOURCE_USERNAME: hxp_admin
      SPRING_DATASOURCE_PASSWORD: localpassword
      HXP_EVENTBRIDGE_BUS_NAME: local
      AWS_REGION: us-east-1
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s; timeout: 5s; retries: 10; start_period: 30s

  guest-profile-service:
    build:
      context: ./services/guest-profile-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      GUEST_PROFILES_TABLE: hxp-local-guest-profiles
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    depends_on:
      - dynamodb-setup

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:8080

  # ─── LocalStack (EventBridge, SQS, SES) ──────────────────
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: events,sqs,ses,secretsmanager
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
