name: CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  lint-and-test-frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --coverage --passWithNoTests
      - run: npm run build

  # ─────────────────────────────────────────────
  lint-and-test-reservation:
    name: Reservation Service — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reservation-service
    services:
      postgres:
        image: postgres:15
        env: { POSTGRES_DB: hxp_test, POSTGRES_USER: hxp, POSTGRES_PASSWORD: test }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }
      - run: mvn -B verify --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hxp_test
          SPRING_DATASOURCE_USERNAME: hxp
          SPRING_DATASOURCE_PASSWORD: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reservation-service-jar
          path: services/reservation-service/target/*.jar

  # ─────────────────────────────────────────────
  lint-and-test-lambdas:
    name: Lambda Services — lint & test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [guest-profile-service, notification-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: "services/${{ matrix.service }}/package-lock.json" }
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --passWithNoTests

  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan (dev)
    runs-on: ubuntu-latest
    needs: [lint-and-test-frontend, lint-and-test-reservation, lint-and-test-lambdas]
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.6.6' }
      - name: Terraform init
        run: terraform init
        working-directory: infrastructure/terraform/environments/dev
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: infrastructure/terraform/environments/dev
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/environments/dev/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `### Terraform Plan (dev)\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    needs: [lint-and-test-frontend, lint-and-test-reservation, lint-and-test-lambdas]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push reservation-service image
        run: |
          docker build -t $ECR_REGISTRY/hxp-reservation-service:$IMAGE_TAG \
                       -t $ECR_REGISTRY/hxp-reservation-service:latest \
                       services/reservation-service
          docker push $ECR_REGISTRY/hxp-reservation-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/hxp-reservation-service:latest

      - name: Deploy Lambda functions
        run: |
          cd services/guest-profile-service && npm ci && npm run build
          zip -j guest-profile.zip dist/*.js
          aws lambda update-function-code \
            --function-name hxp-dev-guest-profile \
            --zip-file fileb://guest-profile.zip

          cd ../notification-service && npm ci && npm run build
          zip -j notification.zip dist/*.js
          aws lambda update-function-code \
            --function-name hxp-dev-notification \
            --zip-file fileb://notification.zip

      - name: Terraform apply (dev)
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="reservation_image_tag=$IMAGE_TAG"
        working-directory: infrastructure/terraform/environments/dev

      - name: Build & deploy frontend
        run: |
          cd frontend && npm ci && npm run build
          aws s3 sync dist/ s3://hxp-dev-frontend --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_DEV }} \
            --paths "/*"

  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → STAGING
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging   # requires manual approval in GitHub
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform apply (staging)
        run: |
          terraform init
          terraform apply -auto-approve -var="reservation_image_tag=$IMAGE_TAG"
        working-directory: infrastructure/terraform/environments/staging

  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod       # requires manual approval in GitHub
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform apply (prod)
        run: |
          terraform init
          terraform apply -auto-approve -var="reservation_image_tag=$IMAGE_TAG"
        working-directory: infrastructure/terraform/environments/prod
